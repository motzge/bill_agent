# Streamlit app configuration for bill_agent.
# "viewer" hides the Deploy button and all developer menu entries --
# the operator only sees the app itself.

[client]
toolbarMode = "viewer"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#4F8BF9"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"

[server]
port = 8501